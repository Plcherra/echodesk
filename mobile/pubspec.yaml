name: echodesk_mobile
description: Echodesk AI receptionist mobile app.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  supabase_flutter: ^2.8.0
  go_router: ^17.1.0
  flutter_secure_storage: ^10.0.0
  http: ^1.2.0
  url_launcher: ^6.2.5
  webview_flutter: ^4.9.0
  app_links: ^6.3.2
  firebase_core: ^4.5.0
  firebase_crashlytics: ^5.0.8
  firebase_messaging: ^16.1.2
  flutter_local_notifications: ^21.0.0
  flutter_callkit_incoming: ^3.0.0
  web_socket_channel: ^3.0.0
  shared_preferences: ^2.2.2
  audioplayers: ^6.0.0

dev_dependencies:
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.3
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon/app_icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#FBFAF8"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#FBFAF8"
  image: "assets/icon/app_icon.png"
